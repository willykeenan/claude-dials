name: ci
on: [push, pull_request]
jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Unit + protocol conformance tests
        run: npm test
      - name: Behavioral-obedience eval (mock, gates on regression)
        run: node eval/obedience.mjs --report eval/obedience_report.md --min-effect 0.15
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: obedience-report
          path: eval/obedience_report.md
